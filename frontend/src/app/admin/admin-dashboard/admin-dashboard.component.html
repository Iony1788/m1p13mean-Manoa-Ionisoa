<div class="container mt-4">
  <h2 class="mb-4">Admin Dashboard</h2>

  <div class="row g-3">

    <!-- Boutiques -->
    <div class="col-md-3">
      <div class="card text-white bg-primary h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <div>
              <h5 class="card-title">Boutiques</h5>
              <p class="card-text mb-1">Total: -</p>
              <p class="card-text mb-0">Actives: -</p>
              <p class="card-text mb-0">En attente: -</p>
            </div>
            <div><i class="fas fa-store fa-2x"></i></div>
          </div>
        </div>
      </div>
    </div>

   <!-- Lots -->
    <div class="col-md-3">
      <div class="card text-white bg-success h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <div>
              <h5 class="card-title">Lots</h5>

              <p class="card-text mb-1">
                Total: {{ total }}
              </p>

              <p class="card-text mb-0">
                Libres: {{ libres }}
              </p>

              <p class="card-text mb-0">
                Réservés: {{ reserves }}
              </p>

              <p class="card-text mb-0">
                Occupés: {{ occupes }}
              </p>

            </div>
            <div><i class="fas fa-box-open fa-2x"></i></div>
          </div>
        </div>
      </div>
    </div>

      <!-- Clients -->
  <div class="col-md-3">
    <div class="card text-white bg-primary h-100">
      <div class="card-body d-flex justify-content-between">
        <div>
          <h5 class="card-title">Clients</h5>
          <p>Total: {{ totalClients }}</p>
        </div>
        <div><i class="fas fa-users fa-2x"></i></div>
      </div>
    </div>
  </div>

    <!-- Transactions -->
    <div class="col-md-3">
      <div class="card text-white bg-danger h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <div>
              <h5 class="card-title">Transactions</h5>
              <p class="card-text mb-1">Total: -</p>
              <p class="card-text mb-0">Revenus: - €</p>
            </div>
            <div><i class="fas fa-dollar-sign fa-2x"></i></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
