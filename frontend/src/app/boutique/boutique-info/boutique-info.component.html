<div class="container mt-4">
  <div class="card shadow-lg border-0">

    <!-- Header -->
    <div class="card-header bg-success text-white">
      <h4 class="mb-0">Modifier les informations de votre boutique</h4>
    </div>

    <div class="card-body">

      <!-- Loader -->
      <div *ngIf="loading" class="alert alert-info d-flex align-items-center" role="alert">
        <div class="spinner-border spinner-border-sm me-2" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        Chargement des informations...
      </div>

      <!-- Message d'erreur -->
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <!-- Formulaire -->
      <form [formGroup]="boutiqueForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label for="nom" class="form-label">Nom</label>
          <input type="text" id="nom" class="form-control" formControlName="nom" placeholder="Nom de la boutique">
          <div *ngIf="boutiqueForm.get('nom')?.invalid && boutiqueForm.get('nom')?.touched" class="text-danger small mt-1">
            Le nom est requis
          </div>
        </div>

        <div class="mb-3">
          <label for="adresse" class="form-label">Adresse</label>
          <input type="text" id="adresse" class="form-control" formControlName="adresse" placeholder="Adresse de la boutique">
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea id="description" class="form-control" rows="3" formControlName="description" placeholder="Description de la boutique"></textarea>
        </div>

        <div class="mb-3">
          <label for="telephone" class="form-label">Téléphone</label>
          <input type="text" id="telephone" class="form-control" formControlName="telephone" placeholder="Numéro de téléphone">
        </div>

        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-success" [disabled]="boutiqueForm.invalid">
            <i class="bi bi-save me-1"></i> Enregistrer
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
