<!-- panier.component.html -->
<div class="container mt-4">
  <h3 class="mb-4">Mon Panier</h3>

  <div *ngIf="panier && panier.length > 0; else emptyCart">
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Produit</th>
          <th>Quantité</th>
          <th>Prix Unitaire</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of panier">
          <td>{{ item.nom_produit || item.nom }}</td>
          <td>{{ item.quantite }}</td>
          <td>{{ item.prix | currency:'EUR' }}</td>
          <td>{{ (item.prix * item.quantite) | currency:'EUR' }}</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th colspan="3" class="text-end">Total Général :</th>
          <th>{{ total | currency:'EUR' }}</th>
        </tr>
      </tfoot>
    </table>
  </div>

  <ng-template #emptyCart>
    <div class="alert alert-info">
      Votre panier est vide.
    </div>
  </ng-template>
</div>
